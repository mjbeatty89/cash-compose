# cash-chroma — ChromaDB vector database
# Used by claude-mem for cross-device semantic search
# Accessible via Tailscale at cashbox:8000 (internal only)

networks:
  cash-shared:
    external: true

services:
  cash-chroma:
    image: chromadb/chroma:latest
    container_name: cash-chroma
    restart: unless-stopped
    # ⚡ Bolt: Increase shm_size from default 64MB to 1GB
    # Vector databases like ChromaDB load large indexes into shared memory.
    # Limiting to 64MB causes memory-to-disk fallback, creating significant
    # latency during semantic search queries.
    shm_size: '1gb'
    ports:
      - "0.0.0.0:8000:8000"   # Tailscale-accessible; not exposed externally
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"
      ALLOW_RESET: "false"
      CHROMA_SERVER_LOG_LEVEL: "WARNING"
    networks:
      - cash-shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  chroma_data:
