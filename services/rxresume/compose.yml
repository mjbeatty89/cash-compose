# Rx Resume — Self-Hosted Resume Builder
# https://rxresu.me | https://github.com/AmruthPillai/Reactive-Resume
#
# Requires: postgres, minio (storage), chrome (PDF export)
# Public URL: https://resume.aadd.rocks
# Local port: 3000
#
# First run: copy .env.example to .env and fill in secrets
# Generate secrets: openssl rand -hex 32

services:

  # ── Database ──────────────────────────────────────────────────────────────
  rxresume-db:
    image: postgres:15-alpine
    container_name: rxresume-db
    restart: unless-stopped
    volumes:
      - rxresume_db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: rxresume
      POSTGRES_USER: rxresume
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rxresume -d rxresume"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Object Storage (avatars, uploads) ────────────────────────────────────
  rxresume-storage:
    image: minio/minio:latest
    container_name: rxresume-storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    volumes:
      - rxresume_storage:/data
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Create default bucket on first start ──────────────────────────────────
  rxresume-storage-init:
    image: minio/mc:latest
    container_name: rxresume-storage-init
    depends_on:
      rxresume-storage:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://rxresume-storage:9000 ${STORAGE_ACCESS_KEY} ${STORAGE_SECRET_KEY};
        mc mb --ignore-existing myminio/default;
        mc anonymous set public myminio/default;
        exit 0;
      "

  # ── Headless Chrome (PDF export) ─────────────────────────────────────────
  rxresume-chrome:
    image: ghcr.io/browserless/chromium:latest
    container_name: rxresume-chrome
    restart: unless-stopped
    environment:
      TIMEOUT: 10000
      CONCURRENT: 10
      TOKEN: ${CHROME_TOKEN}
      EXIT_ON_HEALTH_FAILURE: "true"
      PRE_REQUEST_HEALTH_CHECK: "true"

  # ── Rx Resume App ─────────────────────────────────────────────────────────
  rxresume-app:
    image: amruthpillai/reactive-resume:latest
    container_name: rxresume-app
    restart: unless-stopped
    depends_on:
      rxresume-db:
        condition: service_healthy
      rxresume-storage:
        condition: service_healthy
    ports:
      - "127.0.0.1:3500:3000"
    environment:
      # Public URL (how the browser reaches the app)
      PUBLIC_URL: https://resume.aadd.rocks

      # Database
      DATABASE_URL: postgresql://rxresume:${DB_PASSWORD}@rxresume-db:5432/rxresume

      # Storage (MinIO)
      STORAGE_ENDPOINT: rxresume-storage
      STORAGE_PORT: "9000"
      STORAGE_SSL: "false"
      STORAGE_BUCKET: default
      STORAGE_URL: https://storage-resume.aadd.rocks
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}

      # Auth secrets (generate with: openssl rand -hex 32)
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}

      # Chrome (PDF export)
      CHROME_TOKEN: ${CHROME_TOKEN}
      CHROME_URL: ws://rxresume-chrome:3000

      # Optional: disable new signups once you've created your account
      # DISABLE_SIGNUPS: "true"

volumes:
  rxresume_db:
  rxresume_storage:
